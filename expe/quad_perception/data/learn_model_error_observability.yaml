device: "cuda"
seed: 123

dataset:
  load_filename: "../../data/train_data/quadrotor_10d/data_quad10d_512small_snowdensev3c_combined_dino_states_valhuger.pt"
  load_dino_filename: "../../data/train_data/quadrotor_10d/quad10d_10000_dino_1536.pt"
#  load_filename: "../../data/train_data/inv_pend/pendulum_noback_10000.pt"
#  load_dino_filename: "../../data/train_data/inv_pend/pendulum_noback_10000_dino_1536.pt"
  split: [0.95, 0.05]

model:
  z_dim: 1024 #1536
  u_dim: 3
  y_red_dim: 5
  x_dim: 10
  x_dim_error: 5

losses:
  weight_CPC: 1.0
  weight_dyn: 1.0
  weight_recon: 1.0
  weight_underapprox: 0. #100.0
  weight_acc: 1.0 #0.5

saving:
  save_best_model: None

train:
  wandb:
    enabled: True
    project: null
    entity: null
  lr: 1e-3
  epochs: 10000
  batch_size: 64
  load_ckpt: "../../data/checkpoints/quadrotor_10d/quad10d_checkpoint_observability_ft_2000000_snowdensev4.pt"
  load_ckpt_bound: None #"../../data/checkpoints/quadrotor_10d/quad10d_checkpoint_observability_bound.pt" #None
  save_ckpt_train: "/model_quad10d_supervised_error_train.pt"
  save_ckpt_val: "/model_quad10d_supervised_error_val.pt"